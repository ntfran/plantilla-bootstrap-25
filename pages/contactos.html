<!doctype html>
<html lang="es" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Practica plantillas Bootstrap" />
    <meta name="auth" content="Sandoval Francisco" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <title>Plantilla Bootstrap</title>
  </head>
  <body>
    <header>
      <nav class="navbar bg-primary navbar-expand-lg">
        <div class="container">
          <a href="../index.html" class="navbar-brand">Plantilla Bootstrap</a>
          <button
            class="navbar-toggler"
            data-bs-toggle="collapse"
            data-bs-target="#opcionesMenu"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="navbar-collapse collapse" id="opcionesMenu">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link" href="../index.html">Inicio</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./pages/grilla.html">Grilla</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="./pages/contactos.html"
                  >Contacto</a
                >
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <section class="container justify-content-center">
        <h1 class="my-4 ">Formulario con Stacks</h1>
        <div
          class="container border border-secondary-subtle rounded-3 p-4"
        >
          <form>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="textInput" class="form-label fw-bold">Nombre</label>
                <input
                  type="text"
                  id="textInupt"
                  class="form-control"
                  placeholder="Ej: Juan"
                />
              </div>
              <div class="col-md-6 mb-3">
                <label for="exampleInputEmail1" class="form-label fw-bold"
                  >Email</label
                >
                <input
                  type="email"
                  class="form-control"
                  id="exampleInputEmail1"
                  placeholder="test@ejemplo.com"
                />
              </div>
            </div>
            <div class="mb-3">
              <label for="FormControlTextArea" class="form-label fw-bold"
                >Mensaje</label
              >
              <textarea
                class="form-control"
                id="FormControlTextArea"
                rows="3"
                placeholder="Agrega aqui tu mensaje"
              ></textarea>
            </div>
            <div class="form-check form-switch">
              <input
                class="form-check-input"
                type="checkbox"
                role="switch"
                id="switchCheckDefault"
              />
              <label class="form-check-label mb-3" for="switchCheckDefault"
                >Aceptár terminos</label
              >
            </div>
            <button class="btn btn-primary px-5" type="submit">Enviar</button>
          </form>
        </div>
      </section>
    </main>
    <footer class="text-center bg-dark-subtle py-3">
      <p>&copy;Todos los derechos reservados 2026</p>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
